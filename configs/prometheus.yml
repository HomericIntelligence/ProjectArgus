global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Custom exporter: converts Agamemnon + NATS + Nestor JSON APIs to Prometheus metrics format
  # Runs as argus-exporter sidecar on port 9100
  - job_name: 'homeric-exporter'
    static_configs:
      - targets: ['argus-exporter:9100']

  # JetStream consumer: durable pull subscriber for hi.agents.> and hi.tasks.>
  # Exposes real-time event-rate and task-latency metrics on port 9101
  - job_name: 'jetstream-consumer'
    static_configs:
      - targets: ['jetstream-consumer:9101']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
