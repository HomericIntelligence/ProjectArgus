global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Custom exporter: converts Agamemnon + NATS + Nestor JSON APIs to Prometheus metrics format
  # Runs as argus-exporter sidecar on port 9100
  - job_name: 'homeric-exporter'
    static_configs:
      - targets: ['argus-exporter:9100']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Nomad job and allocation metrics
  - job_name: 'nomad'
    metrics_path: /v1/metrics
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['172.20.0.1:4646']
