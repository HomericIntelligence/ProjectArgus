global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: "null"

  # Uncomment and fill in to enable email notifications:
