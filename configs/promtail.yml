server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail Docker container log files on WSL2 (json-file driver)
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containers
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            tag:
      - regex:
          # Extract container name from the log file path:
          # /var/lib/docker/containers/<id>/<id>-json.log
          source: filename
          expression: '/var/lib/docker/containers/(?P<container_id>[^/]+)/[^/]+-json\.log'
      - labels:
          stream:
          container_id:
      - output:
          source: output
