server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail syslog for host-level events (available in WSL2)
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: hermes
          __path__: /var/log/syslog

  # Tail NATS server log — NATS log directory mounted at /logs/nats
  - job_name: nats
    static_configs:
      - targets:
          - localhost
        labels:
          job: nats
          service: nats-server
          __path__: /logs/nats/nats.log
