server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail syslog for host-level events (available in WSL2)
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: hermes
          __path__: /var/log/syslog

  # Tail NATS server log — path configurable via NATS_LOG_PATH env var
  - job_name: nats
    static_configs:
      - targets:
          - localhost
        labels:
          job: nats
          service: nats-server
          __path__: ${NATS_LOG_PATH}
