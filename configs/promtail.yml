server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail syslog for host-level events (available in WSL2)
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: hermes
          __path__: /var/log/syslog

  # Tail Hermes application log
  - job_name: hermes
    static_configs:
      - targets:
          - localhost
        labels:
          job: hermes
          service: project-hermes
          __path__: /tmp/hermes.log

  # Tail NATS server log
  - job_name: nats
    static_configs:
      - targets:
          - localhost
        labels:
          job: nats
          service: nats-server
          __path__: /home/mvillmow/.local/share/nats/nats.log
