server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Tail syslog for host-level events (available in WSL2)
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: hermes
          __path__: /var/log/syslog

  # Tail Hermes application log
  - job_name: hermes
    static_configs:
      - targets:
          - localhost
        labels:
          job: hermes
          service: project-hermes
          __path__: /logs/hermes.log
    pipeline_stages:
      - replace:
          expression: '(?i)(bearer\s+)[A-Za-z0-9._\-]+'
          replace: '${1}<redacted>'
      - replace:
          expression: '(?i)(token[=:]\s*)[A-Za-z0-9._\-]+'
          replace: '${1}<redacted>'
      - replace:
          expression: '(?i)(key[=:]\s*)[A-Za-z0-9._\-]+'
          replace: '${1}<redacted>'
      - replace:
          expression: '(?i)(secret[=:]\s*)[A-Za-z0-9._\-]+'
          replace: '${1}<redacted>'
      - replace:
          expression: '(?i)(password[=:]\s*)\S+'
          replace: '${1}<redacted>'

  # Tail NATS server log
  - job_name: nats
    static_configs:
      - targets:
          - localhost
        labels:
          job: nats
          service: nats-server
          __path__: /home/mvillmow/.local/share/nats/nats.log
