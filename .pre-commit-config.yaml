repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-json
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: default, rules: {line-length: {max: 120}, truthy: {check-keys: false}}}"]
        files: \.(yml|yaml)$
  - repo: local
    hooks:
      - id: check-version-consistency
        name: Check pixi.toml version matches CHANGELOG
        language: python
        entry: python scripts/check-version-consistency.py
        pass_filenames: false
        files: ^(pixi\.toml|CHANGELOG\.md)$
