[project]
name = "project-argus"
version = "0.1.0"
description = "Observability stack for the HomericIntelligence mesh"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
just = ">=1.13,<2"
jq = ">=1.6,<2"
yamllint = ">=1.35,<2"
ruff = ">=0.4,<1"
bandit = ">=1.7,<2"
pytest = ">=8.0,<9"
python = ">=3.11,<3.14"

[tasks]
start  = "just start"
stop   = "just stop"
status = "just status"
