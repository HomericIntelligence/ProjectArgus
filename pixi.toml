[project]
name = "project-argus"
version = "0.1.0"
description = "Observability stack for the HomericIntelligence mesh"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
just = ">=1.13"
yamllint = ">=1.35"
ruff = ">=0.4"
bandit = ">=1.7"
pyyaml = ">=6.0"
pytest = ">=8.0"
python = ">=3.11"

[target.linux-64.dependencies]
jq = ">=1.6"

[target.osx-arm64.dependencies]
jq = ">=1.6"

[target.osx-64.dependencies]
jq = ">=1.6"

[tasks]
start  = "just start"
stop   = "just stop"
status = "just status"
test   = "pytest tests/ -v"
