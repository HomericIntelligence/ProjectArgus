[project]
name = "project-argus"
version = "0.1.0"
description = "Observability stack for the HomericIntelligence mesh"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
just = ">=1.13"
jq = ">=1.6"

[feature.test.dependencies]
python = ">=3.11"
pytest = ">=7.0"

[feature.lint.dependencies]
python = ">=3.11"
ruff = ">=0.4"

[feature.security.dependencies]
python = ">=3.11"
bandit = ">=1.7"

[environments]
test = ["test"]
lint = ["lint"]
security = ["security"]

[tasks]
start  = "just start"
stop   = "just stop"
status = "just status"
test   = "python -m pytest tests/ -v"
lint   = "ruff check exporter/ tests/"
security = "bandit -ll --skip B310,B202 -r exporter/"
