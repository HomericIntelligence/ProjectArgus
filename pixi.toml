[project]
name = "project-argus"
version = "0.1.0"
description = "Observability stack for the HomericIntelligence mesh"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
just = ">=1.13"
jq = ">=1.6"
yamllint = ">=1.35"
ruff = ">=0.4"
bandit = ">=1.7"
pytest = ">=8.0"
pytest-cov = ">=5.0"
python = ">=3.11"

[tasks]
start     = "just start"
stop      = "just stop"
status    = "just status"
test-unit = "pytest tests/ -v"
