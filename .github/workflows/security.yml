name: Security

on:
  pull_request:
    branches: ["main"]
    paths:
      - "pixi.toml"
      - "pixi.lock"
      - "exporter/requirements*.txt"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    name: pip-audit (PyPI CVE scan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pixi
        run: curl -fsSL https://pixi.sh/install.sh | bash && echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install lint environment
        run: pixi install --environment lint

      - name: Run pip-audit
        run: pixi run --environment lint pip-audit
