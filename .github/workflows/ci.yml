name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true

      - name: Install dependencies
        run: pixi install

      - name: Lint all YAML files
        run: |
          pixi run yamllint -d "{extends: default, rules: {line-length: {max: 120}, truthy: disable}}" \
            configs/prometheus.yml \
            configs/loki.yml \
            configs/promtail.yml \
            configs/grafana/datasources.yml \
            configs/grafana/dashboards.yml \
            rules/agent-alerts.yml \
            rules/atlas-alerts.yml \
            docker-compose.yml

      - name: Validate Grafana dashboard JSON
        run: |
          for f in dashboards/*.json; do
            echo "Validating $f ..."
            python3 - "$f" <<'EOF'
          import json, sys
          with open(sys.argv[1]) as fh:
              d = json.load(fh)
          required = {"title", "uid", "panels"}
          missing = required - d.keys()
          if missing:
              print(f"ERROR: {sys.argv[1]} missing fields: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"  OK: uid={d['uid']!r}, title={d['title']!r}, panels={len(d['panels'])}")
          EOF
          done

      - name: Check docker-compose config
        run: docker compose config --quiet
        env:
          GF_ADMIN_PASSWORD: ci-validation-only

      - name: Lint exporter Python
        run: pixi run ruff check exporter/exporter.py

      - name: Security scan exporter Python
        run: |
          pixi run bandit -ll -f json exporter/exporter.py > /tmp/bandit.json || true
          python3 << 'SCAN_CHECK'
          import json, sys
          with open('/tmp/bandit.json') as f:
              report = json.load(f)
          high_issues = [r for r in report.get('results', []) if r.get('severity') == 'HIGH']
          if high_issues:
              print(f"FAILURE: Found {len(high_issues)} HIGH severity issues")
              for issue in high_issues:
                  print(f"  {issue.get('issue_text')} at line {issue.get('line_number')}")
              sys.exit(1)
          print("SUCCESS: No HIGH severity security issues found")
          SCAN_CHECK

      - name: Lint shell scripts
        run: shellcheck --severity=warning scripts/*.sh

  atlas-dashboard:
    name: Atlas dashboard (Go)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: dashboard/go.mod
          cache-dependency-path: dashboard/go.sum

      - name: go build
        working-directory: dashboard
        run: go build ./...

      - name: go vet
        working-directory: dashboard
        run: go vet ./...

      - name: go test
        working-directory: dashboard
        run: go test -race ./internal/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: dashboard

      - name: Check templ generate (no-op)
        working-directory: dashboard
        run: |
          go install github.com/a-h/templ/cmd/templ@latest
          templ generate ./...
          git diff --exit-code

      - name: Docker build
        working-directory: dashboard
        run: docker build -t argus-dashboard:ci .
