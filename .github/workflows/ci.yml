name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint all YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 120}, truthy: disable}}" \
            configs/prometheus.yml \
            configs/loki.yml \
            configs/promtail.yml \
            configs/grafana/datasources.yml \
            configs/grafana/dashboards.yml \
            rules/agent-alerts.yml \
            docker-compose.yml

      - name: Validate Grafana dashboard JSON
        run: |
          for f in dashboards/*.json; do
            echo "Validating $f ..."
            python3 - "$f" <<'EOF'
          import json, sys
          with open(sys.argv[1]) as fh:
              d = json.load(fh)
          required = {"title", "uid", "panels"}
          missing = required - d.keys()
          if missing:
              print(f"ERROR: {sys.argv[1]} missing fields: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"  OK: uid={d['uid']!r}, title={d['title']!r}, panels={len(d['panels'])}")
          EOF
          done

      - name: Check docker-compose config
        run: docker compose config --quiet

  test:
    name: Test exporter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check exporter/ tests/

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -ll --skip B310,B202 -r exporter/
