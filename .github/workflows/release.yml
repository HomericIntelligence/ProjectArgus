name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pixi
        run: curl -fsSL https://pixi.sh/install.sh | bash && echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pixi install

      - name: Validate tag matches pixi.toml version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          pixi run python3 - <<'EOF'
          import os
          import sys
          import tomllib

          tag = os.environ["TAG"]
          expected_version = tag.lstrip("v")

          with open("pixi.toml", "rb") as f:
              data = tomllib.load(f)

          section = data.get("workspace") or data.get("project")
          if section is None:
              print("ERROR: pixi.toml has neither [workspace] nor [project] section", file=sys.stderr)
              sys.exit(1)

          actual_version = section["version"]
          if actual_version != expected_version:
              print(
                  f"ERROR: Tag {tag!r} does not match pixi.toml version {actual_version!r}",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"OK: tag {tag} matches pixi.toml version {actual_version}")
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            --title "Release $TAG"
