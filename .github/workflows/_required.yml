name: Required Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - run: pip install yamllint && yamllint -c .yamllint.yaml .

      - name: Validate JSON files
        run: |
          echo "::notice::Config-only repo; no source typecheck — validating JSON files instead"
          JSON_FILES=$(find . -path './.git' -prune -o -name "*.json" -print | grep "\.json$" || true)
          if [ -n "$JSON_FILES" ]; then
            FAILED=0
            while IFS= read -r f; do
              if jq . "$f" > /dev/null 2>&1; then
                echo "OK: $f"
              else
                echo "INVALID JSON: $f"
                FAILED=1
              fi
            done <<< "$JSON_FILES"
            if [ "$FAILED" -eq 1 ]; then
              echo "FAIL: one or more JSON files are invalid"
              exit 1
            fi
            echo "OK: all JSON files are valid"
          else
            echo "No JSON files found — nothing to validate"
          fi

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v20.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Validate all YAML config files
        env:
          GF_ADMIN_PASSWORD: ci-validation-only
        run: |
          pip install yamllint
          # Validate Prometheus alert rules via promtool if rules/ directory exists
          if command -v promtool &>/dev/null; then
            find . -path './.git' -prune -o -name "*.yml" -print | xargs promtool check rules 2>/dev/null || true
          fi
          # Validate docker-compose YAML
          if [ -f docker-compose.yml ]; then
            docker compose config --quiet
          fi
          # Validate all YAML files with yamllint (the canonical config-repo unit test)
          find . -path './.git' -prune -o \( -name "*.yml" -o -name "*.yaml" \) -print | xargs yamllint -c .yamllint.yaml
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: false # cache: true causes HTTP 400 in this environment
      - name: Run pytest
        run: pixi run pytest tests/ -v --tb=short --junitxml=junit-unit.xml
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: junit-unit
          path: junit-unit.xml
          retention-days: 7

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Validate docker image name formats
        run: |
          python3 - <<'EOF'
          import subprocess, re, sys

          result = subprocess.run(
              ["grep", "-rh", "image:", "--include=docker-compose*.yml", "--include=docker-compose*.yaml", "."],
              capture_output=True, text=True
          )
          lines = result.stdout.strip().splitlines()

          images = []
          for line in lines:
              parts = line.strip().split()
              if len(parts) >= 2:
                  images.append(parts[-1])

          if not images:
              print("No docker-compose image references found — skipping format validation")
              sys.exit(0)

          # Valid image pattern: [registry/][org/]name[:tag][@digest]
          # Disallow bare unqualified names without at minimum a colon-tag or slash
          valid_pattern = re.compile(
              r'^([a-z0-9][a-z0-9._\-]*(:[0-9]+)?/)?'   # optional registry
              r'([a-z0-9][a-z0-9._\-]*/)*'               # optional org path
              r'[a-z0-9][a-z0-9._\-]*'                   # image name
              r'(:[a-zA-Z0-9][a-zA-Z0-9._\-]*)?'         # optional tag
              r'(@sha256:[a-fA-F0-9]{64})?$'              # optional digest
          )

          failed = []
          for img in sorted(set(images)):
              if not valid_pattern.match(img):
                  failed.append(img)
                  print(f"INVALID image reference format: {img}")
              else:
                  print(f"OK: {img}")

          if failed:
              print(f"\nFAIL: {len(failed)} image reference(s) have invalid format")
              sys.exit(1)
          else:
              print(f"\nOK: all {len(images)} image reference(s) have valid format")
          EOF

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 0

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          fi
        continue-on-error: true

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Validate HCL files or fall back to YAML validation
        run: |
          pip install yamllint
          HCL_FILES=$(find . -path './.git' -prune -o -name "*.hcl" -print | grep "\.hcl$" || true)
          if [ -n "$HCL_FILES" ]; then
            if command -v nomad &>/dev/null; then
              echo "$HCL_FILES" | xargs -I{} nomad job validate {}
            elif command -v hclfmt &>/dev/null; then
              echo "$HCL_FILES" | xargs -I{} hclfmt --check {}
            else
              echo "::notice::HCL files found but no nomad/hclfmt available; validating YAML configs as build step"
              yamllint -c .yamllint.yaml .
            fi
          else
            echo "::notice::No build artifacts; config validation is the build step"
            yamllint -c .yamllint.yaml .
          fi

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Validate workflow YAML files against GitHub Actions schema
        run: |
          pip install check-jsonschema
          check-jsonschema \
            --schemafile https://json.schemastore.org/github-workflow \
            .github/workflows/*.yml

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Ensure no :latest image tags in compose files
        run: |
          LATEST_HITS=$(grep -rh "image:" . --include="*.yml" --include="*.yaml" \
            --exclude-dir=".git" --exclude-dir=".github" | grep ":latest" || true)
          if [ -n "$LATEST_HITS" ]; then
            echo "FAIL: found :latest image tags — pin all images to explicit versions:"
            echo "$LATEST_HITS"
            exit 1
          else
            echo "OK: no :latest image tags found"
          fi

  atlas-dashboard:
    name: atlas/dashboard
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: dashboard/go.mod
          cache-dependency-path: dashboard/go.sum
      - name: go vet
        working-directory: dashboard
        run: go vet ./...
      - name: go test
        working-directory: dashboard
        run: go test ./internal/nats/...
