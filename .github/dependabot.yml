version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/exporter"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    labels:
      - "dependencies"
    target-branch: "main"
    commit-message:
      prefix: "chore(deps)"
