networks:
  argus:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: argus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - argus
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  loki:
    image: grafana/loki:3.1.2
    container_name: argus-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - argus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  promtail:
    image: grafana/promtail:3.1.2
    container_name: argus-promtail
    restart: unless-stopped
    volumes:
      - ./configs/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - ${NATS_LOG_DIR:-/home/mvillmow/.local/share/nats}:/nats-logs:ro
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - argus
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.10"

  grafana:
    image: grafana/grafana:11.2.2
    container_name: argus-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - ./configs/grafana:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD must be set in .env}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - argus
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  argus-exporter:
    build: ./exporter
    container_name: argus-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    environment:
      AGAMEMNON_URL: ${AGAMEMNON_URL:-http://172.20.0.1:8080}
      NESTOR_URL: ${NESTOR_URL:-http://172.20.0.1:8081}
      NATS_URL: ${NATS_URL:-http://172.24.0.1:8222}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - argus
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.10"

  # dev-only: interactive debug shell for exec-based troubleshooting
  # Start with: docker compose --profile dev up -d debug-shell
  debug-shell:
    image: python:3.11.10-slim
    container_name: argus-debug-shell
    profiles: [dev]
    command: sleep infinity
    networks:
      - argus

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
