networks:
  argus:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: argus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - argus
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  loki:
    image: grafana/loki:latest
    container_name: argus-loki
    restart: unless-stopped
    volumes:
      - ./configs/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - argus
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  promtail:
    image: grafana/promtail:latest
    container_name: argus-promtail
    restart: unless-stopped
    volumes:
      - ./configs/promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /tmp:/tmp:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - argus
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  grafana:
    image: grafana/grafana:latest
    container_name: argus-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - ./configs/grafana:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-changeme}"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
    networks:
      - argus
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  argus-exporter:
    image: python:3.11-slim
    container_name: argus-exporter
    restart: unless-stopped
    volumes:
      - ./exporter/exporter.py:/exporter.py:ro
    command: python /exporter.py
    environment:
      AGAMEMNON_URL: "${AGAMEMNON_URL:-http://172.20.0.1:8080}"
      NESTOR_URL: "${NESTOR_URL:-http://172.20.0.1:8081}"
      NATS_URL: "${NATS_URL:-http://172.24.0.1:8222}"
    networks:
      - argus
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:9100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
