groups:
  - name: homeric_health
    rules:
      - alert: AgamemnonDown
        expr: hi_agamemnon_health == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Agamemnon is unreachable"
          description: "ProjectAgamemnon /v1/health has been unreachable for 2 minutes."

      - alert: NestorDown
        expr: hi_nestor_health == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Nestor is unreachable"
          description: "ProjectNestor /v1/health has been unreachable for 2 minutes."

      - alert: ExporterScrapeStale
        expr: time() - homeric_exporter_scrape_timestamp > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Homeric exporter scrape is stale"
          description: "No scrape has completed in more than 5 minutes."

      - alert: HighTaskFailureRate
        expr: >
          (
            hi_tasks_by_status{status="failed"}
            /
            (hi_tasks_total + 1e-9)
          ) > 0.20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task failure rate above 20%"
          description: "More than 20% of tasks are in failed state. Value: {{ $value | humanizePercentage }}."
